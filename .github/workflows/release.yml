name: Release haedoekgi

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build CLI
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags="-s -w" -o "haedoekgi-${GOOS}-${GOARCH}${ext}" .
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: haedoekgi-*

  build-gui-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Windows GUI
        working-directory: gui
        run: |
          npm ci
          npm run tauri build
      - name: Collect GUI artifacts
        shell: bash
        run: |
          mkdir -p dist-gui
          cp gui/src-tauri/target/release/haedoekgi-gui.exe dist-gui/haedoekgi-gui-windows-amd64.exe
          setup=$(ls gui/src-tauri/target/release/bundle/nsis/*-setup.exe 2>/dev/null | head -1)
          if [ -n "$setup" ]; then
            cp "$setup" dist-gui/haedoekgi-gui-windows-amd64-setup.exe
          fi
          ls -la dist-gui/
      - uses: actions/upload-artifact@v4
        with:
          name: gui-windows-amd64
          path: dist-gui/*

  release:
    needs: [build-cli, build-gui-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: List artifacts
        run: ls -laR dist/
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/**
